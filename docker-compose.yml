# ------------------------------------------------------------------------------
# Docker Compose for Laravel + PHP-FPM + Nginx + MySQL (DEV)
# Project-agnostic; /var/www/html is fixed inside containers.
# ------------------------------------------------------------------------------

services:
  # ---------------------------------------------------------------------------
  # One-time workspace bootstrap: prepares host-mounted workspace directories.
  # ---------------------------------------------------------------------------
  init-volumes:
    image: alpine:3.21
    user: "0:0"
    volumes:
      - ./:/mnt/app
      - npm_cache:/mnt/npm_cache
    command: >
      sh -lc "
        set -eux;
        mkdir -p /mnt/app /mnt/app/node_modules /mnt/npm_cache
        chown -R ${UID}:${GID} /mnt/app/node_modules || true
        chown -R ${UID}:${GID} /mnt/npm_cache || true
      "
    restart: "no"

  # ---------------------------------------------------------------------------
  # One-time backend bootstrap: install PHP deps, migrate, and seed local DB.
  # ---------------------------------------------------------------------------
  init-backend:
    build:
      context: ./docker/laravel
      args:
        UID: ${UID}
        GID: ${GID}
    image: php-fpm-dev:8.4-alpine
    user: "${UID}:${GID}"
    environment:
      APP_ENV: ${APP_ENV}
      APP_DEBUG: ${APP_DEBUG}
      TZ: ${TZ}
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: ${MYSQL_PORT}
      DB_DATABASE: ${MYSQL_DATABASE}
      DB_USERNAME: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      DB_SEED_ON_BOOT: ${DB_SEED_ON_BOOT}
      COMPOSER_HOME: /var/www/html/.composer
      XDG_CACHE_HOME: /var/www/html/.cache
      NPM_CONFIG_CACHE: /var/www/html/.npm
    volumes:
      - ./:/var/www/html
      - ./node_modules:/var/www/html/node_modules
    working_dir: "/var/www/html"
    command: >
      sh -lc '
        set -eu

        mkdir -p /var/www/html/.composer /var/www/html/.cache /var/www/html/.npm || true
        chmod -R ug+rwX /var/www/html/.composer /var/www/html/.cache /var/www/html/.npm || true

        if [ ! -f artisan ]; then
          echo "Backend init: artisan not found in /var/www/html"
          exit 1
        fi

        mkdir -p storage bootstrap/cache
        chmod -R ug+rwX storage bootstrap/cache || true

        if [ -f composer.json ] && [ ! -d vendor ]; then
          echo "Backend init: installing Composer dependencies..."
          composer install --no-interaction --prefer-dist
        fi

        echo "Backend init: running migrations..."
        php artisan migrate --force

        if [ "$${DB_SEED_ON_BOOT:-false}" = "true" ]; then
          echo "Backend init: seeding local database..."
          php artisan db:seed --force
        fi
      '
    depends_on:
      init-volumes:
        condition: service_completed_successfully
      db:
        condition: service_healthy
    restart: "no"

  # ---------------------------------------------------------------------------
  # PHP-FPM
  # ---------------------------------------------------------------------------
  php:
    build:
      context: ./docker/laravel
      args:
        UID: ${UID}
        GID: ${GID}
    image: php-fpm-dev:8.4-alpine
    user: "${UID}:${GID}"
    environment:
      APP_ENV: ${APP_ENV}
      APP_DEBUG: ${APP_DEBUG}
      TZ: ${TZ}
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: ${MYSQL_PORT}
      DB_DATABASE: ${MYSQL_DATABASE}
      DB_USERNAME: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      COMPOSER_HOME: /var/www/html/.composer
      XDG_CACHE_HOME: /var/www/html/.cache
      NPM_CONFIG_CACHE: /var/www/html/.npm
    volumes:
      - ./:/var/www/html
      - ./node_modules:/var/www/html/node_modules
    security_opt:
      # Configurable per environment (.env.docker): use seccomp:unconfined when
      # tools inside the container need unprivileged user namespaces (e.g. bwrap).
      - ${PHP_SECURITY_OPT:-seccomp:unconfined}
    working_dir: "/var/www/html"
    command: ["php-fpm"]
    expose:
      - "${PHP_FPM_PORT}"
    depends_on:
      init-backend:
        condition: service_completed_successfully
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Nginx
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    environment:
      SERVER_NAME: ${SERVER_NAME}
      PHP_FPM_PORT: ${PHP_FPM_PORT}
      VITE_PORT: ${VITE_PORT}
    ports:
      - "${NGINX_PORT}:80"
    volumes:
      - ./:/var/www/html:ro
      - ./docker/nginx/default.conf.template:/etc/nginx/templates/default.conf.template:ro
    command: >
      sh -lc '
        set -eux;
        apk add --no-cache gettext >/dev/null 2>&1 || true;

        APP_DIR="/var/www/html";
        export APP_DIR

        envsubst '\''$$SERVER_NAME $$APP_DIR $$PHP_FPM_PORT $$VITE_PORT'\'' \
          < /etc/nginx/templates/default.conf.template \
          > /etc/nginx/conf.d/default.conf;

        nginx -g "daemon off;";
      '
    depends_on:
      init-volumes:
        condition: service_completed_successfully
      php:
        condition: service_started
      vite:
        condition: service_healthy
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Vite dev server
  # ---------------------------------------------------------------------------
  vite:
    image: node:22-alpine
    user: "${UID}:${GID}"
    working_dir: "/var/www/html"
    command: >
      sh -lc '
        set -eu;

        if [ ! -f package.json ]; then
          echo "Vite: no package.json found in /var/www/html";
          exit 1;
        fi

        # Install deps deterministically on first run, and whenever package-lock changes.
        if [ -f package-lock.json ]; then
          LOCK_HASH="$$(sha256sum package-lock.json | awk '"'"'{print $$1}'"'"')";
          MARKER="node_modules/.package-lock.sha256";
          if [ ! -f "$$MARKER" ] || [ "$$(cat "$$MARKER" 2>/dev/null || true)" != "$$LOCK_HASH" ]; then
            echo "Vite: installing deps (npm ci)...";
            npm ci --no-audit --no-fund;
            echo "$$LOCK_HASH" > "$$MARKER";
          fi
        elif [ ! -d node_modules ] || [ -z "$$(ls -A node_modules 2>/dev/null || true)" ]; then
          echo "Vite: installing deps (npm install)...";
          npm install --no-audit --no-fund;
        fi

        if [ ! -x node_modules/.bin/vite ]; then
          echo "Vite: node_modules/.bin/vite is still missing after install";
          exit 1;
        fi

        npm run dev -- --host 0.0.0.0 --port "$$VITE_PORT" --strictPort &
        vite_pid="$$!"
        hot_file="/var/www/html/public/hot"

        while kill -0 "$$vite_pid" 2>/dev/null; do
          if [ -f "$$hot_file" ] && [ "$$(cat "$$hot_file" 2>/dev/null || true)" != "" ]; then
            : > "$$hot_file"
          fi

          sleep 1
        done

        wait "$$vite_pid"
      '
    environment:
      NODE_ENV: ${NODE_ENV}
      NPM_CONFIG_CACHE: /npm-cache
      XDG_CACHE_HOME: /npm-cache
      VITE_PORT: ${VITE_PORT}
    ports:
      - "${VITE_PORT}:${VITE_PORT}"
    healthcheck:
      test: [ "CMD-SHELL", "wget -q --spider http://127.0.0.1:${VITE_PORT}/@vite/client || exit 1" ]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 20s
    volumes:
      - ./:/var/www/html
      - ./node_modules:/var/www/html/node_modules
      - npm_cache:/npm-cache
    depends_on:
      init-volumes:
        condition: service_completed_successfully
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # MySQL 8.0 with Docker-managed named volume
  # ---------------------------------------------------------------------------
  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      TZ: ${TZ}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "${MYSQL_PORT}:3306"
    restart: unless-stopped

# ---------------------------------------------------------------------------
# Network
# ---------------------------------------------------------------------------
networks:
  default:
    name: app_net
    external: false

volumes:
  db_data:
  npm_cache:
