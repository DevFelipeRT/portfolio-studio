services:
  init-volumes:
    volumes:
      - ./:/mnt/app
      - node_modules:/mnt/node_modules
      - npm_cache:/mnt/npm_cache
    command: >
      sh -lc "
        set -eux;
        mkdir -p /mnt/app /mnt/node_modules /mnt/npm_cache
        chown -R ${UID}:${GID} /mnt/node_modules || true
        chown -R ${UID}:${GID} /mnt/npm_cache || true
      "

  init-backend:
    volumes:
      - ./:/var/www/html
      - node_modules:/var/www/html/node_modules

  php:
    volumes:
      - ./:/var/www/html
      - node_modules:/var/www/html/node_modules

  vite:
    volumes:
      - ./:/var/www/html
      - node_modules:/var/www/html/node_modules
      - npm_cache:/npm-cache

  workspace:
    build:
      context: ./docker/devcontainer
      args:
        UID: ${UID}
        GID: ${GID}
    image: portfolio-devcontainer:bookworm
    user: "${UID}:${GID}"
    environment:
      APP_ENV: ${APP_ENV}
      APP_DEBUG: ${APP_DEBUG}
      TZ: ${TZ}
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: ${MYSQL_PORT}
      DB_DATABASE: ${MYSQL_DATABASE}
      DB_USERNAME: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      NODE_ENV: ${NODE_ENV}
      VITE_PORT: ${VITE_PORT}
      COMPOSER_HOME: /var/www/html/.composer
      XDG_CACHE_HOME: /var/www/html/.cache
      NPM_CONFIG_CACHE: /var/www/html/.npm
    volumes:
      - ./:/var/www/html
      - node_modules:/var/www/html/node_modules
    working_dir: /var/www/html
    command: /bin/sh -lc "while sleep 1000; do :; done"
    depends_on:
      init-backend:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  node_modules:
