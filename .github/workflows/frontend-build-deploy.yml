name: Frontend Build + Deploy (master -> server)

on:
  push:
    branches: ["master"]
    paths:
      - "package.json"
      - "package-lock.json"
      - "vite.config.*"
      - "tailwind.config.*"
      - "postcss.config.*"
      - "tsconfig*.json"
      - "resources/**"
  workflow_dispatch: {}

concurrency:
  group: frontend-build-deploy
  cancel-in-progress: true

permissions: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read

    steps:
      - name: Checkout source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify Vite build output
        run: |
          set -euo pipefail
          test -d public/build
          test -f public/build/manifest.json

      - name: Upload public/build artifact
        uses: actions/upload-artifact@v4
        with:
          name: public-build
          path: public/build
          if-no-files-found: error

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: production
    permissions:
      actions: read
      contents: none

    steps:
      - name: Download public/build artifact
        uses: actions/download-artifact@v4
        with:
          name: public-build
          path: public/build

      - name: Verify artifact layout
        run: |
          set -euo pipefail
          test -f public/build/manifest.json
          test -d public/build/assets

      - name: Start SSH agent
        uses: webfactory/ssh-agent@dc588b651fe13675774614f8e6a936a468676387
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Trust remote host
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Upload public/build to server and optimize Laravel
        env:
          HOST: ${{ secrets.HOST }}
          PORT: ${{ secrets.PORT }}
          USERNAME: ${{ secrets.USERNAME }}
          TARGET_DIR: ${{ secrets.TARGET_DIR }}
          APP_DIR: ${{ secrets.APP_DIR }}
        run: |
          set -euo pipefail

          if [ -z "${TARGET_DIR:-}" ]; then
            echo "TARGET_DIR secret is required."
            exit 1
          fi

          if [[ "${TARGET_DIR%/}" == "/" ]]; then
            echo "Refusing to deploy to TARGET_DIR=/"
            exit 1
          fi

          # Historically, TARGET_DIR has been used inconsistently:
          # - some setups point it at the Laravel app root (expects /public/build)
          # - others point it at the webroot (…/public) (expects /build)
          #
          # Keep backward compatibility by detecting the intent from the path.
          if [[ "${TARGET_DIR%/}" == */public ]]; then
            DEST_DIR="${TARGET_DIR%/}/build/"
          else
            DEST_DIR="${TARGET_DIR%/}/public/build/"
          fi

          case "${DEST_DIR}" in
            */build/) ;;
            *)
              echo "Refusing to deploy to unexpected DEST_DIR=${DEST_DIR}"
              exit 1
              ;;
          esac

          ssh -p "${PORT}" -o StrictHostKeyChecking=yes "${USERNAME}@${HOST}" "mkdir -p '${DEST_DIR}'"

          rsync -az --delete \
            -e "ssh -p ${PORT} -o StrictHostKeyChecking=yes" \
            public/build/ \
            "${USERNAME}@${HOST}:${DEST_DIR}"

          PUBLIC_DIR="${TARGET_DIR%/}"
          APP_DIR_OVERRIDE="${APP_DIR:-}"

          ssh -p "${PORT}" -o StrictHostKeyChecking=yes "${USERNAME}@${HOST}" "
            set -e

            PUBLIC_DIR='${PUBLIC_DIR}'
            APP_DIR_OVERRIDE='${APP_DIR_OVERRIDE}'
            RESOLVED_APP_DIR=''

            if [ -n \"\${APP_DIR_OVERRIDE}\" ] && [ -f \"\${APP_DIR_OVERRIDE}/composer.json\" ]; then
              RESOLVED_APP_DIR=\"\${APP_DIR_OVERRIDE}\"
            elif [ -f \"\${PUBLIC_DIR}/composer.json\" ]; then
              RESOLVED_APP_DIR=\"\${PUBLIC_DIR}\"
            elif [ -f \"\$(dirname \"\${PUBLIC_DIR}\")/composer.json\" ]; then
              RESOLVED_APP_DIR=\"\$(dirname \"\${PUBLIC_DIR}\")\"
            fi

            if [ -z \"\${RESOLVED_APP_DIR}\" ]; then
              echo 'Unable to resolve APP_DIR with composer.json.'
              echo \"Checked: \${APP_DIR_OVERRIDE} \${PUBLIC_DIR} \$(dirname \"\${PUBLIC_DIR}\")\"
              exit 1
            fi

            cd \"\${RESOLVED_APP_DIR}\"

            if [ ! -f artisan ]; then
              echo 'artisan not found in resolved app dir.'
              exit 1
            fi

            php artisan optimize:clear
            php artisan optimize
          "

