name: Frontend Deploy (from frontend-dist)

on:
  workflow_run:
    workflows: ["Frontend Build (publish to frontend-dist)"]
    types: [completed]
  workflow_dispatch: {}

concurrency:
  group: frontend-deploy
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment: production
    permissions:
      actions: read
      contents: read

    steps:
      - name: Download public/build artifact
        if: ${{ github.event_name == 'workflow_run' }}
        uses: actions/download-artifact@v4
        with:
          name: public-build
          path: .
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout dist branch
        if: ${{ github.event_name != 'workflow_run' }}
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: "frontend-dist"

      - name: Resolve build source directory
        id: build_src
        run: |
          set -euo pipefail

          pick() {
            echo "source_dir=$1" >> "${GITHUB_OUTPUT}"
          }

          # Preferred layout (from frontend-dist checkout)
          if [ -d "public/build" ]; then
            pick "public/build"
            exit 0
          fi

          # Common artifact layout: extracted directly into workspace root
          if [ -f "manifest.json" ] && [ -d "assets" ]; then
            pick "."
            exit 0
          fi

          # Artifact extracted into a directory named after the artifact
          if [ -d "public-build/public/build" ]; then
            pick "public-build/public/build"
            exit 0
          fi

          if [ -f "public-build/manifest.json" ] && [ -d "public-build/assets" ]; then
            pick "public-build"
            exit 0
          fi

          echo "Unable to locate Vite build output (expected public/build or manifest+assets)."
          echo "Workspace listing:"
          ls -la
          echo "Directory tree:"
          find . -maxdepth 4 -type d -print
          exit 1

      - name: Start SSH agent
        uses: webfactory/ssh-agent@dc588b651fe13675774614f8e6a936a468676387
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Trust remote host
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Upload public/build to server
        env:
          HOST: ${{ secrets.HOST }}
          PORT: ${{ secrets.PORT }}
          USERNAME: ${{ secrets.USERNAME }}
          TARGET_DIR: ${{ secrets.TARGET_DIR }}
          SOURCE_DIR: ${{ steps.build_src.outputs.source_dir }}
        run: |
          set -euo pipefail

          # Historically, TARGET_DIR has been used inconsistently:
          # - some setups point it at the Laravel app root (expects /public/build)
          # - others point it at the webroot (…/public) (expects /build)
          #
          # Keep backward compatibility by detecting the intent from the path.
          if [[ "${TARGET_DIR%/}" == */public ]]; then
            DEST_DIR="${TARGET_DIR%/}/build/"
          else
            DEST_DIR="${TARGET_DIR%/}/public/build/"
          fi

          rsync -az --delete \
            -e "ssh -p ${PORT} -o StrictHostKeyChecking=yes" \
            "${SOURCE_DIR%/}/" \
            "${USERNAME}@${HOST}:${DEST_DIR}"
